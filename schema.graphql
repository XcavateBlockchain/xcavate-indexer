type Bucket @entity {
  id: ID! #bucketId as string
  namespaceId: Int! @index
  bucketId: Int! @index
  creator: String # DID of creator
  name: String # decoded from metadata
  category: String # decoded from metadata
  isWritable: Boolean! # false when paused, true when writable
  encryptionKey: String # current key (hex) when writable
  createdBlock: Int!

  # virtual back-references — no columns, computed by JOIN at query time
  contributors: [BucketContributor!] @derivedFrom(field: "bucket")
  admins: [BucketAdmin!] @derivedFrom(field: "bucket")
  messages: [Message!] @derivedFrom(field: "bucket")
}

type BucketContributor @entity {
  id: ID! # "bucketId-subjectId" — composite key for the N:M pair
  bucket: Bucket! # FK → bucket_id column + index + FK constraint
  subjectId: String! @index # DID of the contributor
  addedBlock: Int!
}

type BucketAdmin @entity {
  id: ID! # "bucketId-subjectId" — composite key for the N:M pair
  bucket: Bucket! # FK → bucket_id column + index + FK constraint
  subjectId: String! @index # DID of the admin
  addedBlock: Int!
}

type Message @entity {
  id: ID! # "bucketId-messageId" (e.g. "1-5")
  bucket: Bucket! # FK
  messageId: Int!
  contributor: String! # DID of the writer (from event arg)
  reference: String # decoded IPFS CID ("baf...")
  tag: String # decoded UTF-8 (e.g. "didcomm/key-sharing-v1")
  description: String # decoded UTF-8
  contentType: String # decoded UTF-8 (e.g. "text/plain;charset=utf-8")
  contentHash: String # hex of [u8; 32]
  createdBlock: Int! # block when message was written (from metadata.created_at)
  ipfsContent: String # fetched text content; null for non-text/plain or fetch failure
}

# RealEstateNft
type RealEstateNft @entity {
  id: ID!
  # on-chain NFT identifiers — needed to find this row from events that only carry (collection, item), e.g. realEstateNfts.Burned
  collection: Int @index
  item: Int @index
  propertyId: String
  propertyName: String
  propertyType: String
  status: String
  propertyDescription: String
  developerAddress: String
  accountAddress: String
  legalRepresentative: String
  planningCode: String
  buildingControlCode: String
  map: String
  createdAt: String
  updatedAt: String

  # company
  companyName: String
  companyLogo: String

  # address
  street: String
  townCity: String
  postCode: String
  flatOrUnit: String
  localAuthority: String

  # financials
  propertyPrice: Int
  pricePerToken: Int
  numberOfTokens: Int
  estimatedRentalIncome: Int
  stampDutyTax: Int
  annualServiceCharge: Int
  isStampDutyPaid: Boolean
  isAnnualServiceChargePaid: Boolean

  # attributes
  numberOfBedrooms: Int
  numberOfBathrooms: Int
  area: String
  outdoorSpace: String
  offStreetParking: String
  quality: String
  constructionDate: String

  # files (S3 object keys; app generates fresh presigned URLs on demand)
  files: [String]
}

# RealWorldAsset
type RealWorldAsset @entity {
  id: ID! # assetId as string
  assetId: Int! @index
  collectionId: Int @index
  itemId: Int @index
  realEstateNft: RealEstateNft
  region: Int
  location: String
  price: String
  tokenAmount: Int
  spvCreated: Boolean
  finalized: Boolean
  ownerAccounts: [String]
  updatedBlock: Int!

  owners: [RealWorldAssetOwner!] @derivedFrom(field: "asset")
}

type RealWorldAssetOwner @entity {
  id: ID! # assetId-account
  asset: RealWorldAsset!
  assetIdNumber: Int! @index
  account: String! @index
  tokenAmount: Int
  updatedBlock: Int!
}

# Marketplace
type MarketplaceOngoingObjectListings @entity {
  id: ID! # listingId as string
  listingId: Int! @index
  assetId: Int @index
  realWorldAsset: RealWorldAsset
  collectionId: Int @index
  itemId: Int @index
  realEstateNft: RealEstateNft
  realEstateDeveloper: String
  tokenPrice: String
  tokenAmount: Int
  listedTokenAmount: Int
  taxPaidByDeveloper: Boolean
  tax: Int
  listingExpiry: Int
  claimExpiry: Int
  relistCount: Int
  unclaimedTokenAmount: Int
  collectedFunds: String
  collectedTax: String
  collectedFees: String
  investorFunds: String
  updatedBlock: Int!

  shareOwners: [MarketplaceShareOwners!] @derivedFrom(field: "ongoingObjectListing")
  shareListings: [MarketplaceShareListings!] @derivedFrom(field: "ongoingObjectListing")
  ongoingOffers: [MarketplaceOngoingOffers!] @derivedFrom(field: "ongoingObjectListing")
  listingSpvProposals: [MarketplaceListingSpvProposals!] @derivedFrom(field: "ongoingObjectListing")
  ongoingLawyerVotings: [MarketplaceOngoingLawyerVotings!] @derivedFrom(field: "ongoingObjectListing")
  propertyLawyers: [MarketplacePropertyLawyers!] @derivedFrom(field: "ongoingObjectListing")
  userLawyerVotes: [MarketplaceUserLawyerVotes!] @derivedFrom(field: "ongoingObjectListing")
}

type MarketplaceShareOwners @entity {
  id: ID! # listingId-account
